version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: doc_chatbot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: doc_chatbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doc_chatbot -h localhost -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: