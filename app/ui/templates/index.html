<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocChat POC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      background: #1f3864;
      color: #fff;
      display: flex;
      flex-direction: column;
      padding: 0;
      flex-shrink: 0;
    }

    #sidebar-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    #sidebar-header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #90caf9;
    }

    #sidebar-header p {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    #upload-section {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    #upload-section label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.5);
      display: block;
      margin-bottom: 8px;
    }

    #upload-btn {
      width: 100%;
      padding: 8px 12px;
      background: #2e75b6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }

    #upload-btn:hover { background: #1a5fa8; }

    #file-input { display: none; }

    #upload-status {
      font-size: 11px;
      margin-top: 6px;
      color: #a5d6a7;
      min-height: 16px;
    }

    #doc-list-section {
      padding: 12px 16px;
      flex: 1;
      overflow-y: auto;
    }

    #doc-list-section label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.5);
      display: block;
      margin-bottom: 8px;
    }

    .doc-item {
      background: rgba(255,255,255,0.07);
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .doc-item-info { flex: 1; min-width: 0; }
    .doc-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-meta  { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }

    .doc-delete {
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-size: 14px;
      padding: 0 0 0 6px;
      line-height: 1;
      flex-shrink: 0;
    }
    .doc-delete:hover { color: #ef9a9a; }

    /* ── Main chat area ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-header {
      background: #fff;
      padding: 14px 24px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #chat-header h2 { font-size: 15px; font-weight: 600; }
    #chat-header span { font-size: 12px; color: #888; }

    #new-chat-btn {
      margin-left: auto;
      padding: 6px 14px;
      background: #f0f2f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    #new-chat-btn:hover { background: #e3e6ea; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message { max-width: 760px; display: flex; flex-direction: column; gap: 6px; }
    .message.user  { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 680px;
      white-space: pre-wrap;
    }

    .message.user .bubble {
      background: #2e75b6;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .citations {
      font-size: 11px;
      color: #666;
      background: #f5f8fc;
      border: 1px solid #d9e8f6;
      border-radius: 8px;
      padding: 8px 12px;
      max-width: 680px;
    }

    .citations strong { display: block; margin-bottom: 4px; color: #2e75b6; }

    .citation-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
    }

    .citation-badge {
      background: #2e75b6;
      color: white;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
    }

    .loading-bubble {
      display: flex;
      gap: 5px;
      padding: 14px 16px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #2e75b6;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── Input bar ── */
    #input-bar {
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 16px 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #message-input {
      flex: 1;
      resize: none;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      min-height: 44px;
      max-height: 140px;
      outline: none;
      transition: border-color 0.2s;
    }

    #message-input:focus { border-color: #2e75b6; }

    #send-btn {
      width: 44px;
      height: 44px;
      background: #2e75b6;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #send-btn:hover   { background: #1a5fa8; }
    #send-btn:disabled{ background: #b0bec5; cursor: not-allowed; }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #aaa;
      gap: 10px;
    }
    #empty-state svg { opacity: 0.3; }
    #empty-state p   { font-size: 14px; }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>DocChat POC</h1>
    <p>pgvector + Claude RAG</p>
  </div>

  <div id="upload-section">
    <label>Upload Document</label>
    <button id="upload-btn" onclick="document.getElementById('file-input').click()">
      + Add Document
    </button>
    <input type="file" id="file-input" accept=".pdf,.docx,.pptx,.txt,.md" />
    <div id="upload-status"></div>
  </div>

  <div id="doc-list-section">
    <label>Indexed Documents</label>
    <div id="doc-list"></div>
  </div>
</div>

<!-- ── Main ── -->
<div id="main">
  <div id="chat-header">
    <h2>Ask your documents</h2>
    <span id="conv-label"></span>
    <button id="new-chat-btn" onclick="newChat()">New Chat</button>
  </div>

  <div id="messages">
    <div id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Upload documents and start asking questions</p>
    </div>
  </div>

  <div id="input-bar">
    <textarea id="message-input" placeholder="Ask a question about your documents…" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">&#10148;</button>
  </div>
</div>

<script>
  let conversationId = null;

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  const textarea = document.getElementById("message-input");
  textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = Math.min(textarea.scrollHeight, 140) + "px";
  });
  textarea.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Document upload ───────────────────────────────────────────────────────
  document.getElementById("file-input").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploadStatus("Uploading…", "#90caf9");

    const fd = new FormData();
    fd.append("file", file);

    try {
      const res = await fetch("/api/documents", { method: "POST", body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Upload failed");
      setUploadStatus(`✓ ${data.chunk_count} chunks indexed`, "#a5d6a7");
      loadDocuments();
    } catch (err) {
      setUploadStatus("✗ " + err.message, "#ef9a9a");
    }
    e.target.value = "";
  });

  function setUploadStatus(msg, color) {
    const el = document.getElementById("upload-status");
    el.textContent = msg;
    el.style.color = color;
    if (color === "#a5d6a7") setTimeout(() => el.textContent = "", 4000);
  }

  // ── Load & render document list ───────────────────────────────────────────
  async function loadDocuments() {
    const res  = await fetch("/api/documents");
    const docs = await res.json();
    const list = document.getElementById("doc-list");
    list.innerHTML = docs.length === 0
      ? '<p style="font-size:11px;color:rgba(255,255,255,0.3)">No documents yet.</p>'
      : docs.map(d => `
          <div class="doc-item">
            <div class="doc-item-info">
              <div class="doc-title" title="${d.filename}">${d.title || d.filename}</div>
              <div class="doc-meta">${d.chunk_count} chunks · ${d.file_type.toUpperCase()}</div>
            </div>
            <button class="doc-delete" onclick="deleteDocument('${d.document_id}', this)" title="Remove">✕</button>
          </div>`
        ).join("");
  }

  async function deleteDocument(id, btn) {
    if (!confirm("Remove this document from the index?")) return;
    await fetch(`/api/documents/${id}`, { method: "DELETE" });
    loadDocuments();
  }

  // ── Chat ──────────────────────────────────────────────────────────────────
  function newChat() {
    conversationId = null;
    document.getElementById("messages").innerHTML = `
      <div id="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>Upload documents and start asking questions</p>
      </div>`;
    document.getElementById("conv-label").textContent = "";
  }

  function appendMessage(role, content, citations) {
    const container = document.getElementById("messages");
    const empty = document.getElementById("empty-state");
    if (empty) empty.remove();

    const div = document.createElement("div");
    div.className = `message ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;
    div.appendChild(bubble);

    if (citations && citations.length > 0) {
      const cDiv = document.createElement("div");
      cDiv.className = "citations";
      cDiv.innerHTML = `<strong>Sources</strong>` +
        citations.map(c =>
          `<div class="citation-item">
            <span class="citation-badge">${c.file_type ? c.file_type.toUpperCase() : "DOC"}</span>
            <span>${c.document_title || c.filename}${c.page_number ? " · p." + c.page_number : ""}</span>
            <span style="margin-left:auto;color:#2e75b6">${Math.round((c.similarity||0)*100)}% match</span>
          </div>`
        ).join("");
      div.appendChild(cDiv);
    }

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function appendLoading() {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "message assistant";
    div.id = "loading-msg";
    div.innerHTML = `<div class="loading-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById("message-input");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";
    document.getElementById("send-btn").disabled = true;

    appendMessage("user", text);
    appendLoading();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, conversation_id: conversationId }),
      });
      const data = await res.json();
      document.getElementById("loading-msg")?.remove();

      if (!res.ok) {
        appendMessage("assistant", "Error: " + (data.detail || "Unknown error"));
      } else {
        conversationId = data.conversation_id;
        document.getElementById("conv-label").textContent = `Conv: ${conversationId.slice(0,8)}…`;
        appendMessage("assistant", data.answer, data.citations);
      }
    } catch (err) {
      document.getElementById("loading-msg")?.remove();
      appendMessage("assistant", "Request failed: " + err.message);
    }

    document.getElementById("send-btn").disabled = false;
    input.focus();
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadDocuments();
</script>
</body>
</html>
